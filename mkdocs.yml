site_name: blendmpc
site_description: Composable blends of model predictive control and reinforcement learning for robotics
repo_url: https://github.com/assawayut/blendmpc
repo_name: blendmpc

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.footer
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.snippets
  - pymdownx.arithmatex:
      generic: true
  - toc:
      permalink: true

extra_javascript:
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Blends:
      - Residual RL: blends/residual.md
      - Policy warm start: blends/warm-start.md
      - Learned terminal cost: blends/terminal-cost.md
      - Expert distillation: blends/distillation.md
  - Backends: backends.md
  - Benchmarks: benchmarks.md
  - Papers: papers.md
  - Contributing: contributing.md
  - Changelog: changelog.md
